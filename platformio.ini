; AuraBip — PlatformIO
[platformio]
default_envs = silent

[env]
framework = arduino
platform = espressif32
monitor_speed = 115200
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.2
    olikraus/U8g2@^2.35.19

; --- Heltec-Prototypen (V3/V4) — Sensorik SIMULIERT (sensors_stub.cpp) ---
[env:silent]
board = heltec_wifi_lora_32_V3   ; V4 nutzt V3-Definition (pin-kompatibel lt. Heltec)

[env:audio]
board = heltec_wifi_lora_32_V3
build_flags = -D VARIANT_AUDIO

; --- Serienboard: ESP32-S3-MINI-1 + BMP581/LSM6DSO32/SHT40 + L96 + E22/SX1262 + MAX98357A ---
; Gemeinsame Basis für series/series_vision
[series_base]
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D BOARD_SERIES
    -D VARIANT_AUDIO
lib_deps =
    ${env.lib_deps}
    jgromes/RadioLib@^7.1.2

[env:series]
board = esp32-s3-devkitc-1       ; ESP32-S3-MINI-1, 8 MB Flash
board_upload.flash_size = 8MB
board_build.partitions = partitions_custom.csv
build_flags = ${series_base.build_flags}
lib_deps = ${series_base.lib_deps}

[env:series_vision]
board = esp32-s3-devkitc-1
board_upload.flash_size = 8MB
board_build.partitions = partitions_custom.csv
build_flags =
    ${series_base.build_flags}
    -D VARIANT_VISION
lib_deps = ${series_base.lib_deps}
